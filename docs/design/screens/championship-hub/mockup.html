<!-- Interactive Layer for atmospheric effect -->
<div class="fixed pointer-events-none w-[500px] h-[500px] bg-primary/5 rounded-full blur-[100px] -z-10 translate-x-[-50%] translate-y-[-50%] opacity-0 transition-opacity duration-500" id="glow-cursor"></div>
<script>
        document.addEventListener('mousemove', (e) => {
            const glow = document.getElementById('glow-cursor');
            glow.style.opacity = '1';
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        document.addEventListener('mouseleave', () => {
            const glow = document.getElementById('glow-cursor');
            glow.style.opacity = '0';
        });

        // Simple button haptics simulation
        document.querySelectorAll('button, a').forEach(el => {
            el.addEventListener('touchstart', () => {
                if ('vibrate' in navigator) {
                    navigator.vibrate(10);
                }
            });
        });
    </script>
